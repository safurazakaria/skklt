backend:
  name: github
  repo: safurazakaria/skklt
  branch: main
  base_url: https://pss-skylert-login.vercel.app
  auth_endpoint: auth

media_folder: "assets/images"
public_folder: "/assets/images"

collections:
  - name: "nilam"
    label: "Aktiviti & Data NILAM"
    folder: "data/nilam"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tajuk Aktiviti", name: "title", widget: "string" }
      - { label: "Ikon FontAwesome", name: "icon", widget: "string", default: "fa-star" }
      - { label: "Keterangan Ringkas", name: "body", widget: "text" }

  - name: "tvpss"
    label: "Siaran YouTube TvPSS"
    folder: "data/tvpss"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tajuk Siaran", name: "title", widget: "string" }
      - { label: "Pautan Embed YouTube URL", name: "embed_url", widget: "string" }
      - { label: "Deskripsi", name: "desc", widget: "text" }

  - name: "program"
    label: "Program PSS Sepanjang 2026"
    folder: "data/program"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nama Program", name: "title", widget: "string" }
      - { label: "Garis Masa (Timeline)", name: "timeline", widget: "string" }
      - { label: "Status", name: "status", widget: "select", options: ["Akan Datang", "Selesai"] }
      - { label: "Deskripsi", name: "desc", widget: "text" }

  - name: "pengawas"
    label: "Senarai Pengawas PSS"
    folder: "data/pengawas"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Nama Penuh", name: "title", widget: "string" }
      - { label: "Jawatan", name: "jawatan", widget: "string" }
      - { label: "Gambar Pengawas", name: "gambar", widget: "image" }

  - name: "rak_buku"
    label: "Rak Buku Maya"
    folder: "data/rak_buku"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Tajuk Buku", name: "title", widget: "string" }
      - { label: "Penulis", name: "penulis", widget: "string" }
      - { label: "Kategori", name: "kategori", widget: "select", options: ["FIKSYEN", "SAINS", "SEJARAH", "MOTIVASI"] }
      - { label: "Gambar Kulit Buku", name: "cover", widget: "image" }
      - { label: "Pautan E-Book (URL)", name: "link", widget: "string" }
